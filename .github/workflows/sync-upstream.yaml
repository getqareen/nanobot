name: Sync upstream
on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/HKUDS/nanobot.git || true
          git fetch upstream main

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream."
          else
            echo "$BEHIND new commits from upstream."
          fi

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        id: merge
        run: |
          if git merge upstream/main --no-edit; then
            echo "result=success" >> "$GITHUB_OUTPUT"
            git push origin main
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Create issue on conflict
        if: steps.merge.outputs.result == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: conflicts } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-conflict',
              state: 'open',
            });
            if (conflicts.length > 0) {
              console.log('Conflict issue already open, skipping.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Upstream sync conflict (HKUDS/nanobot)',
              body: [
                '## Upstream sync failed due to merge conflicts',
                '',
                `**Upstream**: [HKUDS/nanobot](https://github.com/HKUDS/nanobot)`,
                `**Commits behind**: ${process.env.BEHIND}`,
                '',
                '### How to resolve',
                '```bash',
                'git remote add upstream https://github.com/HKUDS/nanobot.git',
                'git fetch upstream main',
                'git merge upstream/main',
                '# Resolve conflicts, then:',
                'git push origin main',
                '```',
              ].join('\n'),
              labels: ['upstream-conflict'],
            });
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          BEHIND: ${{ steps.check.outputs.behind }}
